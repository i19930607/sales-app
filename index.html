<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>業務助理系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8ecf4;--text2:#8b95a8;--text3:#4e5868;
  --accent:#4f8ef7;--accent2:#2d6de0;
  --green:#22c97a;--amber:#f5a623;--red:#f05252;
  --font:'Noto Sans TC',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:10px;--r2:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
nav{position:sticky;top:0;z-index:100;background:rgba(15,17,23,0.95);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;height:52px}
.nav-logo{font-weight:700;font-size:15px;margin-right:16px;white-space:nowrap;flex-shrink:0}
.nav-logo span{color:var(--accent)}
.nav-tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;flex:1}
.nav-tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);white-space:nowrap;transition:all .15s;border:none;background:none;font-family:var(--font)}
.tab:hover{background:var(--bg3);color:var(--text)}
.tab.active{background:var(--accent);color:#fff;font-weight:500}
.page{display:none;padding:16px;max-width:680px;margin:0 auto}
.page.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:12px;letter-spacing:.04em;text-transform:uppercase}
select,input[type=text],input[type=number],input[type=month]{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:var(--font);font-size:14px;padding:10px 12px;outline:none}
select:focus,input:focus{border-color:var(--accent)}
select option{background:var(--bg3)}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
.btn{padding:10px 18px;border-radius:var(--r);border:none;cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font);transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff;width:100%;justify-content:center}
.btn-primary:hover{background:var(--accent2)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:7px}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--text)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-blue{background:rgba(79,142,247,.15);color:var(--accent)}
.badge-green{background:rgba(34,201,122,.15);color:var(--green)}
.badge-amber{background:rgba(245,166,35,.15);color:var(--amber)}
.sku-row{display:grid;grid-template-columns:1fr 80px 44px;gap:8px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.sku-row:last-child{border-bottom:none}
.sku-input{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:14px;padding:7px 8px;text-align:center;outline:none;font-family:var(--mono);width:100%}
.sku-input:focus{border-color:var(--accent)}
.result-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.result-row:last-child{border-bottom:none}
.result-qty{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--green)}
.weather-strip{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.weather-strip::-webkit-scrollbar{display:none}
.weather-day{flex-shrink:0;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:9px 11px;text-align:center;min-width:68px}
.store-check{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer}
.store-check:last-child{border-bottom:none}
.check-box{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.check-box.on{background:var(--accent);border-color:var(--accent)}
.route-stop{display:flex;gap:12px;align-items:flex-start;padding:11px 0;position:relative}
.stop-num{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.stop-line{position:absolute;left:14px;top:40px;bottom:0;width:1px;background:var(--border2)}
.analysis-block{background:var(--bg3);border-left:3px solid var(--accent);border-radius:0 var(--r) var(--r) 0;padding:11px 13px;margin-bottom:9px}
.analysis-title{font-size:11px;color:var(--accent);font-weight:500;margin-bottom:5px;text-transform:uppercase}
.analysis-body{font-size:13px;color:var(--text);line-height:1.6}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
.stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:11px;text-align:center}
.stat-val{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--green)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:2px}
.divider{height:1px;background:var(--border);margin:14px 0}
.empty{text-align:center;padding:28px;color:var(--text3);font-size:13px}
.loading{text-align:center;padding:36px;color:var(--text3);font-size:13px}
.spinner{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.rec-grid{display:grid;grid-template-columns:1fr 76px 76px;gap:7px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.rec-grid:last-child{border-bottom:none}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">業務<span>助理</span></div>
  <div class="nav-tabs">
    <button class="tab active" onclick="showPage('predict',this)">叫貨預測</button>
    <button class="tab" onclick="showPage('route',this)">路線規劃</button>
    <button class="tab" onclick="showPage('newprod',this)">新品調研</button>
    <button class="tab" onclick="showPage('report',this)">月結報告</button>
    <button class="tab" onclick="showPage('addsku',this)">新增品項</button>
    <button class="tab" onclick="showPage('record',this)">抄貨紀錄</button>
  </div>
</nav>

<!-- 叫貨預測 -->
<div class="page active" id="page-predict">
  <div id="holiday-banner" style="display:none;background:linear-gradient(135deg,#c0392b,#e74c3c);border-radius:var(--r2);padding:14px 16px;margin-bottom:12px;color:#fff;font-size:14px;line-height:1.5"></div>
  <div class="card">
    <div class="card-title">選擇門市</div>
    <select id="sel-predict" onchange="onPredictStore()"></select>
  </div>
  <div class="card" id="card-zone" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="card-title" style="margin:0">商圈類型</div>
      <span class="badge badge-blue" id="zone-badge"></span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px" id="zone-btns"></div>
    <div id="zone-info" style="display:none"></div>
  </div>
  <div class="card" id="card-weather" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="card-title" style="margin:0">本週天氣預報</div><span id="weather-source" style="font-size:10px;color:var(--text3)"></span></div>
    <div class="weather-strip" id="weather-strip"></div>
    <div id="weather-alert" style="margin-top:8px"></div>
  </div>
  <div class="card" id="card-sku" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="card-title" style="margin:0">輸入現場庫存</div>
      <button class="btn btn-sm btn-ghost" onclick="clearInputs()">清除</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 80px 44px;gap:8px;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--border)">
      <div style="font-size:11px;color:var(--text3)">品項</div>
      <div style="font-size:11px;color:var(--text3);text-align:center">現有庫存</div>
      <div style="font-size:11px;color:var(--text3);text-align:center">單位</div>
    </div>
    <div id="sku-list"></div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="calcPrediction()">計算建議叫貨量</button>
  </div>
  <div class="card" id="card-result" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="card-title" style="margin:0">建議叫貨量</div>
      <span class="badge badge-green" id="result-date-badge"></span>
    </div>
    <div id="result-list"></div>
    <div class="divider"></div>
    <div id="result-insight" style="font-size:12px;color:var(--text2);line-height:1.7"></div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="navToStore()">開啟 Google Maps 導航</button>
  </div>
</div>

<!-- 路線規劃 -->
<div class="page" id="page-route">
  <div class="card">
    <div class="card-title">出發設定</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div>
        <label>出發地點</label>
        <select id="start-point">
          <option value="24.9763645,121.2503166">內壢家</option>
          <option value="25.1489,121.4042">八里家（松子腳）</option>
        </select>
      </div>
      <div>
        <label>交通方式</label>
        <select id="transport">
          <option value="driving">開車</option>
          <option value="motorcycling">騎車</option>
        </select>
      </div>
    </div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="card-title" style="margin:0">選擇今日門市</div>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="checkin-count" style="font-size:11px;color:var(--green)"></span>
        <button class="btn btn-sm btn-ghost" onclick="clearRouteChecks()">清除</button>
      </div>
    </div>
    <div id="store-list-route"></div>
  </div>
  <button class="btn btn-primary" onclick="planRoute()">規劃最佳路線</button>
  <div class="card" id="card-route-result" style="display:none;margin-top:12px">
    <div class="card-title">建議路線順序</div>
    <div id="route-stops"></div>
    <div class="divider"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button class="btn btn-primary" onclick="openRoute('google')">Google Maps</button>
      <button class="btn btn-ghost" onclick="openRoute('waze')">Waze</button>
    </div>
  </div>
</div>

<!-- 新品調研 -->
<div class="page" id="page-newprod">
  <div class="card">
    <div class="card-title" style="margin-bottom:8px">API 設定</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:8px">輸入 Anthropic API Key 啟用 AI 分析（僅存在本機）</div>
    <div style="display:flex;gap:8px">
      <input type="password" id="np-apikey" placeholder="sk-ant-..." style="flex:1;font-size:13px"
        onchange="localStorage.setItem('np_apikey',this.value)">
      <button class="btn btn-sm btn-ghost" onclick="
        document.getElementById('np-apikey').value=localStorage.getItem('np_apikey')||'';
        alert('已載入');">載入</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">新品資訊</div>
    <div style="display:grid;gap:10px">
      <div><label>產品名稱</label><input type="text" id="np-name" placeholder="例：蒙面騎士威士忌 700ml"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label>品類</label>
          <select id="np-cat"><option>啤酒</option><option>威士忌</option><option>燒酒</option><option>飲料</option><option>水</option><option>紅酒</option><option>藥酒</option><option>調酒</option><option>高粱</option><option>食品</option><option>其他</option></select>
        </div>
        <div><label>建議售價（元）</label><input type="number" id="np-price" placeholder="350"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label>規格</label><input type="text" id="np-spec" placeholder="700ml"></div>
        <div><label>品牌</label><input type="text" id="np-brand" placeholder="品牌名稱"></div>
      </div>
      <div><label>特色（選填）</label><input type="text" id="np-feat" placeholder="低卡、限定口味..."></div>
    </div>
    <button class="btn btn-primary" style="margin-top:14px" onclick="analyzeProduct()">產生市場調研報告</button>
  </div>
  <div id="np-result"></div>
</div>

<!-- 月結報告 -->
<div class="page" id="page-report">
  <div class="card">
    <div class="card-title">產生月結報告</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div><label>門市</label><select id="sel-report"></select></div>
      <div><label>月份</label><input type="month" id="report-month" style="color-scheme:dark"></div>
    </div>
    <button class="btn btn-primary" onclick="generateReport()">產生報告</button>
  <div style="display:flex;gap:8px;margin-top:8px">
    <button class="btn btn-ghost" style="flex:1" onclick="exportStorePDF()">📄 店長報告 PDF</button>
    <button class="btn btn-ghost" style="flex:1" onclick="exportManagerPDF()">📊 主管總覽 PDF</button>
  </div>
  </div>
  <div id="report-content"></div>
  <div id="pdf-btn-area" style="display:none;margin-top:4px;padding:0 0 24px">
    <button class="btn btn-primary" onclick="exportPDF()" style="background:var(--green);color:#0a2e1a">
      下載 PDF 報告
    </button>
  </div>
</div>

<!-- 新增品項 -->
<div class="page" id="page-addsku">
  <div id="holiday-banner" style="display:none;background:linear-gradient(135deg,#c0392b,#e74c3c);border-radius:var(--r2);padding:14px 16px;margin-bottom:12px;color:#fff;font-size:14px;line-height:1.5"></div>
  <div class="card">
    <div class="card-title">選擇門市</div>
    <select id="sel-addsku" onchange="onAddSKUStore()"></select>
  </div>
  <div class="card" id="card-addsku-list" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="card-title" style="margin:0">目前追蹤品項</div>
      <span class="badge badge-blue" id="addsku-count">0 項</span>
    </div>
    <div id="addsku-list"></div>

  </div>
  <div class="card" id="card-addsku-search" style="display:none">
    <div class="card-title">從品項資料庫搜尋</div>
    <input type="text" id="sku-search" placeholder="輸入品名關鍵字..." oninput="doSearch(this.value)">
    <div id="search-results" style="margin-top:10px"></div>
  </div>
  <div class="card" id="card-addsku-form" style="display:none">
    <div class="card-title">手動新增品項</div>
    <div style="display:grid;gap:10px">
      <div><label>品名</label><input type="text" id="new-name" placeholder="品名"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label>品號（選填）</label><input type="text" id="new-id" placeholder="B2XX001"></div>
        <div><label>單位</label>
          <select id="new-unit"><option>瓶</option><option>箱</option><option>罐</option><option>包</option><option>盒</option><option>桶</option><option>個</option></select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label>預估叫量</label><input type="number" id="new-avg" placeholder="6" min="0"></div>
        <div><label>叫貨間隔（天）</label><input type="number" id="new-gap" placeholder="7" min="1"></div>
      </div>
    </div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="saveNewSKU()">新增到此門市</button>
  </div>
</div>

<!-- 抄貨紀錄 -->
<div class="page" id="page-record">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="card-title" style="margin:0">抄貨紀錄</div>
      <span class="badge badge-green" id="rec-today"></span>
    </div>
    <div style="margin-bottom:10px">
      <label style="font-size:12px;color:var(--text2)">門市</label>
      <select id="sel-record" onchange="onRecordStore()"></select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:end">
      <div>
        <label style="font-size:12px;color:var(--text2)">抄貨日期</label>
        <input type="date" id="rec-date" style="width:100%">
      </div>
      <div id="rec-last-visit" style="font-size:11px;color:var(--text3);padding-bottom:8px"></div>
    </div>
  </div>
  <div id="record-form" style="display:none">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="card-title" style="margin:0">現場盤點</div>
        <button class="btn btn-sm btn-ghost" onclick="clearRecForm()">清除</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 90px;gap:7px;margin-bottom:7px;padding-bottom:6px;border-bottom:1px solid var(--border)">
        <div style="font-size:11px;color:var(--text3)">品項</div>
        <div style="font-size:11px;color:var(--text3);text-align:center">叫貨量</div>
      </div>
      <div id="rec-sku-list"></div>
      <div style="margin-top:12px"><label>備註</label><input type="text" id="rec-note" placeholder="店長反映、陳列狀況..."></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <button class="btn btn-primary" onclick="saveRecord()">儲存紀錄</button>
      <button class="btn btn-ghost" onclick="exportRecord()">匯出 CSV</button>
    </div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="card-title" style="margin:0">歷史紀錄</div>
      <button class="btn btn-sm btn-ghost" onclick="exportAllRecords()">📥 匯出全部</button>
    </div>
    <div id="rec-history"></div>
  </div>
</div>

function syncRecordsToGitHub(){
  if(visitRecords.length === 0) return;
  
  // 把所有抄貨紀錄轉成 CSV 格式
  var lines = ["order_id,order_date,store_id,store_name_raw,sku_id,sku_name,qty,unit"];
  visitRecords.forEach(function(r){
    r.items.forEach(function(it){
      lines.push([
        "REC-"+r.store_id+"-"+r.date,
        r.date, r.store_id, r.store_name,
        it.id, it.name, it.ordered, it.unit
      ].join(","));
    });
  });
  var csvContent = lines.join("\n");
  var b64 = btoa(unescape(encodeURIComponent(csvContent)));
  
  var apiUrl = "https://api.github.com/repos/"+GITHUB_USER+"/"+GITHUB_REPO+"/contents/抄貨紀錄_all.csv";
  var headers = {
    "Authorization": "token "+GITHUB_TOKEN,
    "Content-Type": "application/json"
  };
  
  // 先取得現有檔案的 SHA
  fetch(apiUrl, {headers: headers})
    .then(function(r){ return r.json(); })
    .then(function(data){
      var sha = data.sha || "";
      var body = {
        message: "Update visit records "+new Date().toISOString().slice(0,10),
        content: b64,
        sha: sha
      };
      return fetch(apiUrl, {
        method: "PUT",
        headers: headers,
        body: JSON.stringify(body)
      });
    })
    .then(function(r){
      if(r.ok) console.log("✓ 抄貨紀錄已同步到 GitHub");
      else r.text().then(function(t){ console.error("✗ 同步失敗:", t); });
    })
    .catch(function(e){ console.error("✗ GitHub 同步錯誤:", e); });
}

function getTodayKey(){
  var d = new Date();
  return d.getFullYear()+"-"+(String(d.getMonth()+1).padStart(2,"0"))+"-"+(String(d.getDate()).padStart(2,"0"));
}

function loadCheckins(){

}

function saveCheckins(){
  try{ _store.set("checkins",JSON.stringify(_checkins)); }catch(e){}
}

function toggleCheckin(storeId){
  var today = getTodayKey();
  if(!_checkins[today]) _checkins[today] = [];
  var idx = _checkins[today].indexOf(storeId);
  if(idx >= 0){
    _checkins[today].splice(idx, 1);
  } else {
    _checkins[today].push(storeId);
  }
  saveCheckins();
  renderCheckinStatus();
}

function isCheckedIn(storeId){
  var today = getTodayKey();
  return _checkins[today] && _checkins[today].indexOf(storeId) >= 0;
}

function loadVisitRecordsFromGitHub(){
  var baseUrl = window.location.href.replace(/index\.html.*$/, "");
  fetch(baseUrl + "抄貨紀錄_all.csv?" + Date.now())
    .then(function(r){ if(!r.ok) throw new Error("no file"); return r.text(); })
    .then(function(csv){
      var lines = csv.trim().split("\n");
      if(lines.length < 2) return;
      // 解析 CSV：order_id,order_date,store_id,store_name_raw,sku_id,sku_name,qty,unit
      var records = {};
      for(var i=1; i<lines.length; i++){
        var cols = lines[i].split(",");
        if(cols.length < 8) continue;
        var date     = cols[1].trim();
        var storeId  = cols[2].trim();
        var storeName= cols[3].trim();
        var skuId    = cols[4].trim();
        var skuName  = cols[5].trim();
        var qty      = cols[6].trim();
        var unit     = cols[7].trim();
        var key      = date + "_" + storeId;
        if(!records[key]){
          records[key] = {date:date, store_id:storeId, store_name:storeName, items:[], note:""};
        }
        if(qty && qty !== "0"){
          records[key].items.push({id:skuId, name:skuName, unit:unit, ordered:qty});
        }
      }
      // 轉成陣列，依日期排序
      var loaded = Object.values(records).sort(function(a,b){
        return b.date.localeCompare(a.date);
      });
      if(loaded.length > 0){
        visitRecords = loaded;
        saveVRecs();
        renderRecHistory();
        console.log("✓ 從 GitHub 載入抄貨紀錄：" + loaded.length + " 筆");

        // 同步更新 last_order_override（供叫貨預測顯示最新日期）
        var overrides = {};
        loaded.forEach(function(r){
          if(!overrides[r.store_id]) overrides[r.store_id] = {};
          r.items.forEach(function(it){
            var cur = overrides[r.store_id][it.id];
            if(!cur || r.date > cur){
              overrides[r.store_id][it.id] = r.date;
            }
          });
        });
        try{ localStorage.setItem("last_order_override", JSON.stringify(overrides)); }catch(e){}
      }
    })
    .catch(function(){
      console.log("尚無雲端抄貨紀錄，使用本機資料");
    });
}

function getAllSkus(storeId){
  var base=[];
  try{
    if(typeof STORE_SKUS_DATA!=="undefined"&&STORE_SKUS_DATA[storeId]){
      base=STORE_SKUS_DATA[storeId];
    }
  }catch(e){}
  var cust=customSKUs[storeId]||[];
  var baseIds=base.map(function(s){return s.sku_id;});
  var extra=cust.filter(function(s){return baseIds.indexOf(s.sku_id)===-1;});
  return extra.concat(base);
}

function getSkus(storeId){
  // 用於叫貨預測：過濾手動下架 + 超過180天自動隱藏
  var hidden=hiddenSKUs[storeId]||[];
  var restored=restoredSKUs[storeId]||[];
  return getAllSkus(storeId).filter(function(s){
    if(hidden.indexOf(s.sku_id)!==-1) return false;
    if(s.default_hidden && restored.indexOf(s.sku_id)===-1) return false;
    return true;
  });
}

function getActiveSkus(storeId){
  // 用於抄貨紀錄：只過濾手動下架，保留所有你代理的品項
  var hidden=hiddenSKUs[storeId]||[];
  return getAllSkus(storeId).filter(function(s){
    return hidden.indexOf(s.sku_id)===-1;
  });
}

function renderWeatherFallback(){
  var _today = new Date();
  var _days = ["日","一","二","三","四","五","六"];
  var _wdata = [];
  for(var _i=0;_i<7;_i++){
    var _d = new Date(_today); _d.setDate(_today.getDate()+_i);
    var _mm = _d.getMonth()+1; var _dd = _d.getDate();
    var _dl = _i===0?"今天":_i===1?"明天":"週"+_days[_d.getDay()];
    _wdata.push({label:_dl+" "+_mm+"/"+_dd,tmax:28+_i%3,tmin:21,rain:_i===2?12:0,rainProb:_i===2?70:20,icon:_i===2?"🌧":"☀️"});

function renderWeather(){
  var store=STORES.filter(function(s){return s.id===currentStoreId;})[0];
  if(!store){renderWeatherFallback();return;}

  // 直接用各店精確座標，不分地區

  if(_weatherCache[cacheKey]){renderWeatherUI(_weatherCache[cacheKey]);return;}
  document.getElementById("weather-strip").innerHTML="<div style=\"color:var(--text3);font-size:12px;padding:10px\">天氣載入中...</div>";

  var url="https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon
    +"&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,weathercode"
    +"&timezone=Asia%2FTaipei&forecast_days=7";

  fetch(url)
    .then(function(r){
      if(!r.ok)throw new Error(r.status);
      return r.json();
    })
    .then(function(data){
      var d=data.daily;
      if(!d||!d.temperature_2m_max)throw new Error("bad data");
      var dayNames=["日","一","二","三","四","五","六"];
      var days=[];
      for(var i=0;i<7;i++){
        var dt=new Date(d.time[i]);
        var mm=dt.getMonth()+1; var dd=dt.getDate();
        var dl=i===0?"今天":i===1?"明天":"週"+dayNames[dt.getDay()];
        days.push({
          label:dl+" "+mm+"/"+dd,
          tmax:Math.round(d.temperature_2m_max[i]),
          tmin:Math.round(d.temperature_2m_min[i]),
          rain:Math.round(d.precipitation_sum[i]*10)/10,
          rainProb:Math.round(d.precipitation_probability_max[i]||0),
          icon:getWeatherIcon(d.weathercode[i])
        });
      }
      _weatherCache[cacheKey]=days;
      renderWeatherUI(days);
    })
    .catch(function(e){
      console.warn("Weather API failed:",store.name,e);
      renderWeatherFallback();
    });
}

function calcPrediction(){
  var skus=getSkus(currentStoreId);
  var zone=getZone(currentStoreId);
  var zc=ZONE_COEFF[zone]||ZONE_COEFF.mixed;
  var today=new Date();
  var month=today.getMonth()+1;
  var isMonthEnd=today.getDate()>=25;
  // 使用真實天氣快取，fallback 用模擬值
  var _wd = _weatherCache[currentStoreId] || [
    {tmax:28,rain:0,rainProb:20},{tmax:27,rain:0,rainProb:20},{tmax:24,rain:12,rainProb:70}
  ];
  var wHot   = _wd[0].tmax>=31||_wd[1].tmax>=31||(_wd[2]&&_wd[2].tmax>=31);
  var wWet   = _wd[0].rain>=10||_wd[1].rain>=10||(_wd[2]&&_wd[2].rain>=10);
  var wHumid = _wd[0].rainProb>=70||_wd[1].rainProb>=70||(_wd[2]&&_wd[2].rainProb>=70);
  var results=[];
  for(var i=0;i<skus.length;i++){
    var s=skus[i];
    var el=document.getElementById("si-"+s.sku_id);
    var stock=el?parseFloat(el.value)||0:0;
    var recent=s.recent_avg||0;
    var ly=s.ly_avg||recent;
    var py=s.py_avg||recent;
    // 如果有 XGBoost 預測，用 XGB 70% + 規則 30%
    var ruleBase=recent*0.5+ly*0.3+py*0.2;
    var xgbPred=getXGBPred(currentStoreId,s.sku_id);
    var base=xgbPred!==null?(xgbPred*0.7+ruleBase*0.3):ruleBase;
    var factor=1.0;
    var reasons=[];
    var isDrink=/水|飲料|茶|涼茶|可爾必思|汽水/.test(s.sku_name);
    var isAlc=/啤酒|威士忌|燒酒|高粱|紅酒|清露|蒙面|貓頭鷹|雪山|百威|三隻猴/.test(s.sku_name);
    var isFood=/麵|一條根|鮪魚|鯖魚/.test(s.sku_name);
    if(wHot&&isDrink){factor*=1.15;reasons.push("高溫+15%");}
    if(wHot&&isAlc){factor*=1.08;reasons.push("高溫+8%");}
    if(wWet&&isDrink){factor*=0.90;reasons.push("降雨-10%");}
    if(wHumid&&isDrink){factor*=1.05;reasons.push("高濕+5%");}
    var zf=isDrink?zc.water:isAlc?zc.liquor:isFood?zc.food:zc.beer;
    if(zf!==1.0){factor*=zf;reasons.push(zc.label+(zf>1?"+":"")+Math.round((zf-1)*100)+"%");}
    if(month>=5&&month<=8&&isDrink){factor*=1.12;reasons.push("夏季+12%");}
    if((month>=11||month<=2)&&isAlc){factor*=1.15;reasons.push("冬旺+15%");}
    if(isMonthEnd){factor*=0.90;reasons.push("月底-10%");}
    var predicted=Math.max(0,Math.round(base*factor));
    var suggestion=Math.max(0,predicted-stock);
    results.push({name:s.sku_name,unit:s.unit,stock:stock,predicted:predicted,suggestion:suggestion,
      breakdown:"近"+recent+" 去年"+ly+" 前年"+py,reason:reasons.join("、")||"歷史均值"});
  }
  renderResults(results,zc.label);
}

function nearestNeighbor(stores,startLat,startLon){
  var rem=stores.slice(),sorted=[],lat=startLat,lon=startLon;
  while(rem.length>0){
    var minD=Infinity,minI=0;
    for(var i=0;i<rem.length;i++){
      var d=Math.pow(rem[i].lat-lat,2)+Math.pow(rem[i].lon-lon,2);
      if(d<minD){minD=d;minI=i;}
    }
    sorted.push(rem[minI]);
    lat=rem[minI].lat;lon=rem[minI].lon;
    rem.splice(minI,1);
  }
  return sorted;
}

function openRoute(app){

    var startCoord=startVal[0]+","+startVal[1];

    url+="?travelmode="+(modeMap[travelMode]||"driving");

    window.open(url,"_blank");

  }else if(app==="waze"){
    // Waze 只支援單一目的地，開第一站
    var firstAddr=sorted[0]?sorted[0].addr:"";
    window.open("https://waze.com/ul?navigate=yes&to="+encodeURIComponent(firstAddr),"_blank");

        alert("Waze 不支援多站導航，已開啟第一站："+sorted[0].name+"\n建議改用 Google Maps 進行多站導航。");

    }
  }
}

    html+="<div style=\"font-size:13px;font-weight:500\">"+name+"</div>";
    html+="<div style=\"font-size:11px;color:var(--text3);margin-top:2px\">"+brand+" · "+spec+" · NT$"+price+"</div></div>";
    var block="",blockTitle="";
    function flushBlock(){
      if(blockTitle){
        html+="<div class=\"analysis-block\"><div class=\"analysis-title\">"+blockTitle+"</div>";
        html+="<div class=\"analysis-body\">"+block.replace(/\n/g,"<br>")+"</div></div>";
      }
    }
    for(var i=0;i<lines.length;i++){
      var l=lines[i].trim();
      if(!l)continue;
      if(/^\d\./.test(l)){flushBlock();blockTitle=l.replace(/^\d\.\s*/,"");block="";}
      else{block+=(block?"<br>":"")+l;}
    }
    flushBlock();
    html+="<div class=\"divider\"></div><div style=\"font-size:11px;color:var(--text3)\">分析基準：56 家小北 3.5 年歷史 · AI 輔助生成</div></div>";
    res.innerHTML=html;
  }).catch(function(e){
    res.innerHTML="<div class=\"card\"><div style=\"color:var(--text2);font-size:13px\">API 需部署到伺服器後才能使用。本機測試時請設定 ANTHROPIC_API_KEY。</div></div>";
  });
}

// ── 月結報告 ──────────────────────────────────────────────────
function generateReport(){
  var storeId=document.getElementById("sel-report").value;
  var month=document.getElementById("report-month").value;
  if(!storeId||!month){alert("請選擇門市和月份");return;}
  var store=STORES.filter(function(s){return s.id===storeId;})[0];
  var parts=month.split("-");
  var year=parts[0],mon=parts[1];
  var nextMonNum=parseInt(mon)===12?1:parseInt(mon)+1;
  var nextMonYear=parseInt(mon)===12?parseInt(year)+1:parseInt(year);
  var nextMon=nextMonYear+"/"+String(nextMonNum).padStart(2,"0");
  var isSummer=parseInt(mon)>=5&&parseInt(mon)<=8;
  var isWinter=parseInt(mon)>=11||parseInt(mon)<=2;

  // 真實月度資料
  var storeMonthly=(typeof MONTHLY_DATA!=="undefined"&&MONTHLY_DATA[storeId])||{};
  var realItems=storeMonthly[month]||[];

  // 合併抄貨紀錄（當月）
  var recMap={};
  visitRecords.forEach(function(r){
    if(r.store_id!==storeId) return;
    if(!r.date||r.date.slice(0,7)!==month) return;
    r.items.forEach(function(it){
      if(!recMap[it.name]) recMap[it.name]={name:it.name,unit:it.unit,qty:0};
      recMap[it.name].qty += parseFloat(it.ordered)||0;
    });
  });
  var recItems=Object.values(recMap);

  // 合併靜態月度資料和抄貨紀錄
  var mergedMap={};
  realItems.forEach(function(d){
    mergedMap[d[0]]={name:d[0],unit:d[1],actual:d[2],predicted:d[3]};
  });
  recItems.forEach(function(it){
    if(mergedMap[it.name]){
      // 抄貨紀錄加進實際量
      mergedMap[it.name].actual=(mergedMap[it.name].actual||0)+it.qty;
    } else {
      mergedMap[it.name]={name:it.name,unit:it.unit,actual:it.qty,predicted:null};
    }
  });

  var hasPast=Object.keys(mergedMap).length>0;
  var monthData;
  if(hasPast){
    monthData=Object.values(mergedMap);
  } else {
    var skus=getSkus(storeId);
    monthData=skus.map(function(s){
      var freq=s.avg_gap>0?Math.round(30/s.avg_gap):4;
      return {name:s.sku_name,unit:s.unit,actual:null,predicted:Math.round(s.recent_avg*freq)};
    });
  }

  var totalQty=monthData.reduce(function(a,b){return a+(b.actual!==null?b.actual:b.predicted);},0);
  var topSku=monthData.slice().sort(function(a,b){return (b.actual!==null?b.actual:b.predicted)-(a.actual!==null?a.actual:a.predicted);})[0];

  var html="";
  // 標題
  html+="<div style=\"background:linear-gradient(135deg,var(--accent2),#9b6dff);border-radius:var(--r2);padding:18px;margin-bottom:12px\">";
  html+="<div style=\"font-size:18px;font-weight:700;margin-bottom:3px\">"+store.name+" "+year+"年"+mon+"月 月結報告</div>";
  html+="<div style=\"font-size:13px;opacity:.8\">"+(hasPast?"實際銷售分析":"預測報告（無歷史資料）")+"</div></div>";

  // 統計
  html+="<div class=\"stat-grid\">";
  html+="<div class=\"stat-box\"><div class=\"stat-val\">"+Math.round(totalQty)+"</div><div class=\"stat-lbl\">"+(hasPast?"本月總出貨":"次月預測量")+"</div></div>";
  html+="<div class=\"stat-box\"><div class=\"stat-val\">"+monthData.length+"</div><div class=\"stat-lbl\">品項數</div></div>";
  html+="<div class=\\\"stat-box\\\"><div class=\\\"stat-val\\\" style=\\\"font-size:14px;line-height:1.3\\\">"+(topSku?topSku.name.replace(/\\d+cc|\\d+ml|\\d+ML/gi,"").trim().substring(0,6):"–")+"</div><div class=\\\"stat-lbl\\\">最熱品項</div></div>";
  html+="</div>";

  // 本月分析（只有真實資料才顯示）
  if(hasPast){
    html+="<div class=\"card\"><div class=\"card-title\">本月叫貨分析（對比去年同月）</div>";
    for(var i=0;i<Math.min(8,monthData.length);i++){
      var d=monthData[i];
      var pct=d.predicted>0?Math.round(((d.actual-d.predicted)/d.predicted)*100):0;
      var col=pct>5?"var(--green)":pct<-5?"var(--red)":"var(--text2)";
      html+="<div class=\"result-row\"><div><div style=\"font-size:14px\">"+d.name+"</div>";
      html+="<div style=\"font-size:11px;color:var(--text2)\">本月 "+d.actual+" · 去年同月 "+d.predicted+" "+d.unit+"</div></div>";
      html+="<span style=\"font-family:var(--mono);font-size:14px;font-weight:500;color:"+col+"\">"+(pct>0?"+":"")+pct+"%</span></div>";
    }
    html+="</div>";
  }

  // 次月預測
  html+="<div class=\"card\"><div class=\"card-title\">"+nextMon+" 叫貨預測</div>";
  html+="<div class=\"analysis-block\"><div class=\"analysis-title\">預測依據</div><div class=\"analysis-body\">以近 90 天均值（60%）加去年同期（40%）為基準。";
  if(isSummer)html+="進入夏季，飲料水類需求預估上升 10-15%。";
  if(isWinter)html+="冬季旺季，酒類需求預估上升 10-12%。";
  html+="</div></div>";
  if(hasPast&&topSku&&topSku.actual!==null){
    html+="<div class=\"analysis-block\"><div class=\"analysis-title\">本月觀察</div>";
    html+="<div class=\"analysis-body\">"+topSku.name+" 為本月最大品項，實際出貨 "+topSku.actual+" "+topSku.unit+"。</div></div>";
  }
  if(hasPast){
    // realItems 是 [name, unit, actual, predicted] 陣列格式
    for(var j=0;j<Math.min(8,realItems.length);j++){
      var fi=realItems[j];
      var fname=fi[0], funit=fi[1], factual=fi[2], fbase=fi[3]||fi[2];
      var fpred=Math.max(1,Math.round(factual*0.6+fbase*0.4));
      html+="<div class=\"result-row\"><div><div style=\"font-size:14px\">"+fname+"</div>";
      html+="<div style=\"font-size:11px;color:var(--text2)\">次月建議量</div></div>";
      html+="<div style=\"text-align:right\"><span class=\"result-qty\">"+fpred+"</span> ";
      html+="<span style=\"font-size:11px;color:var(--text3)\">"+funit+"</span></div></div>";
    }
  } else {
    // 無歷史資料，用 getSkus 物件格式
    var futureSkus=getSkus(storeId);
    for(var j=0;j<Math.min(8,futureSkus.length);j++){
      var fs=futureSkus[j];
      var freq=fs.avg_gap>0?Math.round(30/fs.avg_gap):4;
      var fpred=Math.max(1,Math.round((fs.recent_avg||5)*freq));
      html+="<div class=\"result-row\"><div><div style=\"font-size:14px\">"+fs.sku_name+"</div>";
      html+="<div style=\"font-size:11px;color:var(--text2)\">次月建議量</div></div>";
      html+="<div style=\"text-align:right\"><span class=\"result-qty\">"+fpred+"</span> ";
      html+="<span style=\"font-size:11px;color:var(--text3)\">"+fs.unit+"</span></div></div>";
    }
  }
  html+="</div>";

  var cont=document.getElementById("report-content");
  cont.innerHTML=html;
  document.getElementById("pdf-btn-area").style.display="block";
  cont.scrollIntoView({behavior:"smooth"});
}

function onAddSKUStore(){
  addSkuStoreId=document.getElementById("sel-addsku").value;

function renderAddSkuList(){
  var all = getAllSkus(addSkuStoreId);
  var cust = customSKUs[addSkuStoreId] || [];
  var hidden = hiddenSKUs[addSkuStoreId] || [];
  var custIds = cust.map(function(s){ return s.sku_id; });
  var activeCount = all.filter(function(s){ return hidden.indexOf(s.sku_id) === -1; }).length;
  document.getElementById("addsku-count").textContent = activeCount + " 項使用中 / " + hidden.length + " 項已下架";

  var container = document.getElementById("addsku-list");
  container.innerHTML = "";

  if(all.length === 0){
    container.innerHTML = "<div class='empty'>尚無品項</div>";
    return;
  }

  all.forEach(function(s){
    var isC = custIds.indexOf(s.sku_id) !== -1;
    var restored = restoredSKUs[addSkuStoreId] || [];
    var isH = hidden.indexOf(s.sku_id) !== -1 || (s.default_hidden && restored.indexOf(s.sku_id) === -1);

    var row = document.createElement("div");
    row.className = "sku-row";
    row.style.cssText = "grid-template-columns:1fr auto auto;gap:8px;" + (isH ? "opacity:.45;" : "");

    // 品名欄
    var info = document.createElement("div");
    var nameDiv = document.createElement("div");
    nameDiv.style.fontSize = "13px";
    nameDiv.textContent = s.sku_name;
    if(isH){
      var tag = document.createElement("span");
      tag.textContent = " 已下架";
      tag.style.cssText = "font-size:10px;color:var(--red);margin-left:4px";
      nameDiv.appendChild(tag);
    }
    var metaDiv = document.createElement("div");
    metaDiv.style.cssText = "font-size:11px;color:var(--text3)";
    var lastStr = s.last_order ? " · 上次 " + s.last_order : "";
    metaDiv.textContent = "均量 " + s.recent_avg + " " + s.unit + " · 每 " + s.avg_gap + " 天" + lastStr;
    info.appendChild(nameDiv);
    info.appendChild(metaDiv);

    // 標籤欄
    var badge = document.createElement("span");
    if(isC){
      badge.className = "badge badge-amber";
      badge.textContent = "自訂";
    }

    // 按鈕欄
    var btnGroup = document.createElement("div");
    btnGroup.style.cssText = "display:flex;gap:4px";

    if(isH){
      // 已下架 → 只顯示恢復
      var btnRestore = document.createElement("button");
      btnRestore.className = "btn btn-sm btn-ghost";
      btnRestore.textContent = "恢復上架";
      btnRestore.onclick = function(){ unhideSku(addSkuStoreId, s.sku_id); };
      btnGroup.appendChild(btnRestore);
    } else {
      if(isC){
        // 自訂品項 → 編輯 + 刪除
        var btnEdit = document.createElement("button");
        btnEdit.className = "btn btn-sm btn-ghost";
        btnEdit.textContent = "編輯";
        btnEdit.onclick = function(){ openEditModal(addSkuStoreId, s); };

        var btnDel = document.createElement("button");
        btnDel.className = "btn btn-sm";
        btnDel.style.cssText = "background:var(--red);color:#fff;padding:4px 8px";
        btnDel.textContent = "刪除";
        btnDel.onclick = function(){
          if(!confirm("確定刪除 " + s.sku_name + "？")) return;
          if(!customSKUs[addSkuStoreId]) return;
          customSKUs[addSkuStoreId] = customSKUs[addSkuStoreId].filter(function(x){ return x.sku_id !== s.sku_id; });
          saveCSkus();
          renderAddSkuList();
        };
        btnGroup.appendChild(btnEdit);
        btnGroup.appendChild(btnDel);
      } else {
        // 歷史品項 → 下架
        var btnHide = document.createElement("button");
        btnHide.className = "btn btn-sm btn-ghost";
        btnHide.style.cssText = "color:var(--red);border-color:rgba(240,82,82,.4)";
        btnHide.textContent = "下架";
        btnHide.onclick = function(){ hideSku(addSkuStoreId, s.sku_id); };
        btnGroup.appendChild(btnHide);
      }
    }

    row.appendChild(info);
    row.appendChild(badge);
    row.appendChild(btnGroup);
    container.appendChild(row);
  });
}

function hideSku(storeId, skuId){
  if(!hiddenSKUs[storeId]) hiddenSKUs[storeId] = [];
  if(hiddenSKUs[storeId].indexOf(skuId) === -1) hiddenSKUs[storeId].push(skuId);
  saveHidden();
  // 從恢復清單移除
  if(restoredSKUs[storeId]){
    restoredSKUs[storeId] = restoredSKUs[storeId].filter(function(id){ return id !== skuId; });
    saveRestored();
  }
  renderAddSkuList();
}

function unhideSku(storeId, skuId){
  // 從手動下架清單移除
  if(hiddenSKUs[storeId]){
    hiddenSKUs[storeId] = hiddenSKUs[storeId].filter(function(id){ return id !== skuId; });
    saveHidden();
  }
  // 記錄為「已手動恢復」，讓 default_hidden 失效
  if(!restoredSKUs[storeId]) restoredSKUs[storeId] = [];
  if(restoredSKUs[storeId].indexOf(skuId) === -1) restoredSKUs[storeId].push(skuId);
  saveRestored();
  renderAddSkuList();
}


function saveNewSKU(){

  var unit=document.getElementById("new-unit").value;

  var gap=parseInt(document.getElementById("new-gap").value)||7;
  if(!customSKUs[addSkuStoreId])customSKUs[addSkuStoreId]=[];
  if(customSKUs[addSkuStoreId].some(function(s){return s.sku_id===id;})){alert("此品號已存在");return;}
  customSKUs[addSkuStoreId].unshift({sku_id:id,sku_name:name,unit:unit,recent_avg:avg,ly_avg:avg,avg_gap:gap,order_count:0});

  document.getElementById("new-name").value="";

  document.getElementById("new-avg").value="";
  document.getElementById("new-gap").value="";
  alert("已新增："+name);
}

function doSearch(kw){
  var res=document.getElementById("search-results");
  if(!kw||kw.length<2){res.innerHTML="";_searchCache=[];return;}
  var all=[];
  try{
    Object.keys(STORE_SKUS_DATA).forEach(function(sid){
      STORE_SKUS_DATA[sid].forEach(function(s){if(s.sku_name.indexOf(kw)!==-1)all.push(s);});
    });
  }catch(e){}
  var seen={};
  _searchCache=all.filter(function(s){if(seen[s.sku_id])return false;seen[s.sku_id]=true;return true;}).slice(0,10);
  if(_searchCache.length===0){res.innerHTML="<div style=\"font-size:12px;color:var(--text3);padding:8px 0\">找不到符合的品項</div>";return;}
  var html="";
  for(var i=0;i<_searchCache.length;i++){
    var s=_searchCache[i];

    html+="<div><div style=\"font-size:13px\">"+s.sku_name+"</div>";
    html+="<div style=\"font-size:11px;color:var(--text3)\">"+s.sku_id+" · 均量 "+s.recent_avg+" "+s.unit+"</div></div>";
    html+="<button class=\"btn btn-sm btn-ghost\" data-act=\"adds\" data-idx=\""+i+"\">加入</button>";
    html+="</div>";
  }
  res.innerHTML=html;
}

function clearRecForm(){

function saveRecord(){
  if(!recStoreId){alert("請選擇門市");return;}
  var store=STORES.filter(function(s){return s.id===recStoreId;})[0];
  var skus=getActiveSkus(recStoreId);
  var items=[];
  skus.forEach(function(s){
    var oe=document.getElementById("ro-"+s.sku_id);
    var or=oe?oe.value:"";
    if(or!==""){
      items.push({id:s.sku_id,name:s.sku_name,unit:s.unit,ordered:or});
    }
  });
  if(items.length===0){alert("請至少輸入一項數量");return;}
  var recDateEl=document.getElementById("rec-date");
  var today=new Date();
  var ds=recDateEl&&recDateEl.value?recDateEl.value:(today.getFullYear()+"-"+(String(today.getMonth()+1).padStart(2,"0"))+"-"+(String(today.getDate()).padStart(2,"0")));
  var note=document.getElementById("rec-note").value.trim();
  visitRecords=visitRecords.filter(function(r){return !(r.date===ds&&r.store_id===recStoreId);});
  visitRecords.unshift({date:ds,store_id:recStoreId,store_name:store.name,items:items,note:note});
  saveVRecs();
  renderRecHistory();

  // 同步更新 last_order 到 localStorage
  var overrides = JSON.parse(localStorage.getItem("last_order_override")||"{}");
  if(!overrides[recStoreId]) overrides[recStoreId] = {};
  items.forEach(function(it){
    overrides[recStoreId][it.id] = ds;
  });
  localStorage.setItem("last_order_override", JSON.stringify(overrides));

  clearRecForm();
  // 自動同步到 GitHub
  syncRecordsToGitHub();
  alert("已儲存 "+store.name+" "+ds+" 抄貨紀錄（"+items.length+" 項）");
}

function exportRecord(){
  if(!recStoreId){alert("請先選擇門市");return;}
  var today=new Date();
  var ds=today.getFullYear()+"-"+(String(today.getMonth()+1).padStart(2,"0"))+"-"+(String(today.getDate()).padStart(2,"0"));
  var rec=visitRecords.filter(function(r){return r.date===ds&&r.store_id===recStoreId;})[0];
  if(!rec){alert("請先儲存今日紀錄");return;}
  var lines=["日期,"+rec.date,"門市,"+rec.store_name,"","品項,叫貨量,單位"];
  rec.items.forEach(function(it){lines.push(it.name+","+it.ordered+","+it.unit);});
  if(rec.note)lines.push("","備註,"+rec.note);
  var blob=new Blob([lines.join("\n")],{type:"text/csv;charset=utf-8;"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download=rec.store_name+"_"+rec.date+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

  if(!storeId || !month){ alert("請先選擇門市和月份"); return; }
  var store = STORES.filter(function(s){ return s.id===storeId; })[0];
  if(!store) return;

  var yr = month.slice(0,4), mon = parseInt(month.slice(5,7));
  var nextMon = mon===12 ? (parseInt(yr)+1)+"年01月" : yr+"年"+(String(mon+1).padStart(2,"0"))+"月";

  // 讀取月度資料
  var storeMonthly = (typeof MONTHLY_DATA!=="undefined" && MONTHLY_DATA[storeId]) || {};
  var realItems = storeMonthly[month] || [];

  // 合併抄貨紀錄
  var recMap = {};
  visitRecords.forEach(function(r){
    if(r.store_id!==storeId || !r.date || r.date.slice(0,7)!==month) return;
    r.items.forEach(function(it){
      if(!recMap[it.name]) recMap[it.name]={name:it.name,unit:it.unit,actual:0,predicted:null};
      recMap[it.name].actual += parseFloat(it.ordered)||0;
    });
  });
  realItems.forEach(function(d){
    if(!recMap[d[0]]) recMap[d[0]]={name:d[0],unit:d[1],actual:d[2],predicted:d[3]};
    else { if(!recMap[d[0]].predicted) recMap[d[0]].predicted=d[3]; }
  });

  var data = Object.values(recMap).filter(function(d){ return d.actual>0; })
    .sort(function(a,b){ return b.actual-a.actual; });

  // 過濾超過180天
  var skuMap = {};
  var skus = getAllSkus ? getAllSkus(storeId) : [];
  skus.forEach(function(s){ skuMap[s.sku_name]=s; });
  data = data.filter(function(d){
    var s = skuMap[d.name];
    return !s || (s.days_since!==undefined ? s.days_since<=180 : true);
  });

  var total = data.reduce(function(a,b){ return a+b.actual; },0);

  // XGBoost
  var xgbStore = _xgbPredictions && _xgbPredictions[storeId];
  var xgbMap = {};
  if(xgbStore) xgbStore.forEach(function(x){ xgbMap[x.sku_name]=x.xgb_pred; });

  // 產生明細 HTML
  var rows1 = data.map(function(d){
    var pct = d.predicted>0 ? Math.round(((d.actual-d.predicted)/d.predicted)*100) : null;
    var pctStr = pct!==null ? (pct>0?"+":"")+pct+"%" : "—";
    var pctCol = pct!==null ? (pct>5?"#27ae60":pct<-5?"#c0392b":"#666") : "#999";
    return "<tr><td>"+d.name+"</td><td>"+Math.round(d.actual)+"</td>"
      +"<td>"+(d.predicted!=null?Math.round(d.predicted):"—")+"</td>"
      +"<td style='color:"+pctCol+";font-weight:600'>"+pctStr+"</td>"
      +"<td>"+d.unit+"</td></tr>";
  }).join("");

  var rows2 = data.map(function(d){
    var ruleQty = Math.max(1, Math.round(d.actual*0.6+(d.predicted||d.actual)*0.4));
    var xgbQty  = xgbMap[d.name];
    var fpred   = xgbQty ? Math.round(ruleQty*0.4+xgbQty*0.6) : ruleQty;
    var aiTag   = xgbQty ? "<span style='color:#27ae60;font-size:10px'> AI</span>" : "";
    return "<tr><td>"+d.name+"</td><td style='font-weight:600'>"+fpred+aiTag+"</td>"
      +"<td>"+d.unit+"</td></tr>";
  }).join("");

  var now = new Date().toLocaleDateString("zh-TW");
  var printHTML = "<!DOCTYPE html><html><head><meta charset='UTF-8'>"
    +"<title>"+store.name+" "+month+" 月結報告</title>"
    +"<style>"
    +"*{margin:0;padding:0;box-sizing:border-box;font-family:'Microsoft JhengHei','Noto Sans TC',sans-serif}"
    +"body{padding:20px;font-size:13px;color:#222}"
    +".header{background:linear-gradient(135deg,#5856d6,#9b6dff);color:#fff;padding:18px 24px;border-radius:8px;margin-bottom:16px}"
    +".header h1{font-size:18px;font-weight:700;margin-bottom:4px}"
    +".header p{font-size:11px;opacity:.8}"
    +".stats{display:flex;gap:12px;margin-bottom:16px}"
    +".stat{flex:1;background:#f5f5ff;border-radius:6px;padding:12px;text-align:center}"
    +".stat-val{font-size:22px;font-weight:700;color:#5856d6}"
    +".stat-lbl{font-size:10px;color:#888;margin-top:2px}"
    +"h2{font-size:13px;font-weight:700;margin:16px 0 8px;padding-bottom:4px;border-bottom:2px solid #5856d6}"
    +"table{width:100%;border-collapse:collapse;font-size:12px}"
    +"th{background:#f0f0fa;padding:7px 10px;text-align:left;font-weight:600;font-size:11px}"
    +"td{padding:6px 10px;border-bottom:1px solid #eee}"
    +"tr:nth-child(even){background:#fafafa}"
    +".footer{margin-top:20px;font-size:10px;color:#aaa;text-align:right}"
    +"@media print{body{padding:10px}}"
    +"</style></head><body>"
    +"<div class='header'><h1>"+store.name+"　"+yr+"年"+String(mon).padStart(2,"0")+"月　月結報告</h1>"
    +"<p>本月總叫貨 "+Math.round(total)+" 箱／瓶　共 "+data.length+" 品項　產生時間："+now+"</p></div>"
    +"<div class='stats'>"
    +"<div class='stat'><div class='stat-val'>"+Math.round(total)+"</div><div class='stat-lbl'>本月總叫貨</div></div>"
    +"<div class='stat'><div class='stat-val'>"+data.length+"</div><div class='stat-lbl'>品項數</div></div>"
    +"<div class='stat'><div class='stat-val'>"+(data[0]?data[0].name.replace(/\d+cc|\d+ml/gi,"").trim().substring(0,6):"—")+"</div><div class='stat-lbl'>最熱品項</div></div>"
    +"</div>"

    +"<h2>"+nextMon+" 叫貨建議</h2>"

      var bg = i%2===0 ? "" : "background:#fafafa";

      +"</div>"
      +"<table><tr><th>門市</th><th>本月</th><th>去年同月</th><th>增減</th><th>最熱品項</th></tr>"+rows+"</table>";

  var now = new Date().toLocaleDateString("zh-TW");
  var grandTotal = Math.round(Object.values(storeTotals).reduce(function(a,b){ return a+b.actual; },0));

  var printHTML = "<!DOCTYPE html><html><head><meta charset='UTF-8'>"
    +"<title>主管總覽 "+month+"</title>"
    +"<style>"
    +"*{margin:0;padding:0;box-sizing:border-box;font-family:'Microsoft JhengHei','Noto Sans TC',sans-serif}"

    +".header h1{font-size:17px;font-weight:700;margin-bottom:3px}"
    +".header p{font-size:10px;opacity:.8}"
    +".stats{display:flex;gap:10px;margin-bottom:14px}"
    +".stat{flex:1;background:#f5f5ff;border-radius:6px;padding:10px;text-align:center}"
    +".stat-val{font-size:20px;font-weight:700;color:#5856d6}"
    +".stat-pct{font-size:11px;font-weight:600;margin:2px 0}"
    +".stat-lbl{font-size:10px;color:#888}"
    +".region-header{display:flex;justify-content:space-between;align-items:center;"
    +"background:#ededfa;padding:7px 10px;border-radius:4px;margin:14px 0 6px;font-weight:600;font-size:12px}"
    +"table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:4px}"
    +"th{background:#f0f0fa;padding:6px 8px;text-align:left;font-weight:600;font-size:10px}"
    +"td{padding:5px 8px;border-bottom:1px solid #eee}"
    +".footer{margin-top:14px;font-size:9px;color:#aaa;text-align:right}"
    +"@media print{body{padding:8px}}"
    +"</style></head><body>"
    +"<div class='header'><h1>業務月結總覽　"+yr+"年"+String(mon).padStart(2,"0")+"月</h1>"
    +"<p>共 "+STORES.length+" 家門市　本月總叫貨 "+grandTotal+" 箱／瓶　產生時間："+now+"</p></div>"
    +"<div class='stats'>"+statCards+"</div>"
    +regionSections
    +"<div class='footer'>業務助理系統自動產生　列印時請選擇「另存為PDF」</div>"

// ── event delegation（統一處理所有按鈕事件）─────────────────
document.addEventListener("click",function(e){
  var el=e.target.closest("[data-act]");
  if(!el)return;
  var act=el.dataset.act;
  // rm/hide/unhide handled directly in renderAddSkuList via onclick
  if(act==="edit"){
    var sid3=el.dataset.sid,skuid3=el.dataset.skuid;
    if(!customSKUs[sid3])return;
    var sku=customSKUs[sid3].filter(function(s){return s.sku_id===skuid3;})[0];
    if(!sku)return;
    openEditModal(sid3,sku);
  }
  if(act==="adds"){
    var idx=parseInt(el.dataset.idx);
    var sku=_searchCache[idx];
    if(!sku||!addSkuStoreId)return;
    if(!customSKUs[addSkuStoreId])customSKUs[addSkuStoreId]=[];
    var inBase=getSkus(addSkuStoreId).some(function(s){return s.sku_id===sku.sku_id;});
    if(inBase){alert("此品項已在追蹤清單中");return;}
    customSKUs[addSkuStoreId].unshift(sku);
    saveCSkus();renderAddSkuList();
    document.getElementById("sku-search").value="";
    document.getElementById("search-results").innerHTML="";
    _searchCache=[];
    alert("已加入："+sku.sku_name);
  }
  if(act==="delr"){
    var date=el.dataset.date,rsid=el.dataset.rsid;
    if(!confirm("確定刪除 "+date+" 的紀錄？"))return;
    visitRecords=visitRecords.filter(function(r){return !(r.date===date&&r.store_id===rsid);});
    saveVRecs();renderRecHistory();
  }
  if(act==="editr"){
    var idx=parseInt(el.dataset.idx);
    var rec=visitRecords[idx];
    if(!rec)return;
    // 載入該筆紀錄到表單
    recStoreId=rec.store_id;
    document.getElementById("sel-record").value=rec.store_id;
    document.getElementById("rec-date").value=rec.date;
    document.getElementById("record-form").style.display="block";
    renderSkuList("rec-sku-list",rec.store_id,"rec");
    // 填入原本的叫貨量
    setTimeout(function(){
      rec.items.forEach(function(it){
        var el2=document.getElementById("ro-"+it.id);
        if(el2)el2.value=it.ordered;
      });
      var noteEl=document.getElementById("rec-note");
      if(noteEl)noteEl.value=rec.note||"";
    },100);
    // 捲動到表單
    document.getElementById("record-form").scrollIntoView({behavior:"smooth"});
  }
});

  var skuId=document.getElementById("edit-sku-id").value;
  var name=document.getElementById("edit-name").value.trim();
  var unit=document.getElementById("edit-unit").value;

  renderAddSkuList();
}

<!-- 編輯品項 Modal -->
<div id="edit-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:999;display:none;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:20px;width:100%;max-width:400px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:15px;font-weight:500">編輯品項</div>
      <button class="btn btn-sm btn-ghost" onclick="closeEditModal()">✕</button>
    </div>
    <div style="display:grid;gap:10px">
      <input type="hidden" id="edit-sku-id">
      <input type="hidden" id="edit-store-id">
      <div><label>品名</label><input type="text" id="edit-name"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label>單位</label>
          <select id="edit-unit"><option>瓶</option><option>箱</option><option>罐</option><option>包</option><option>盒</option><option>桶</option><option>個</option></select>
        </div>
        <div><label>預估叫量</label><input type="number" id="edit-avg" min="0"></div>
      </div>
      <div><label>叫貨間隔（天）</label><input type="number" id="edit-gap" min="1"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px">
      <button class="btn btn-primary" onclick="saveEdit()">儲存</button>
      <button class="btn btn-ghost" onclick="closeEditModal()">取消</button>
    </div>
  </div>
</div>
</body>
</html>
