name: Daily Model Training

on:
  schedule:
    - cron: '0 22 * * *'  # 每天台灣時間早上 6 點
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install xgboost pandas numpy scikit-learn requests

      - name: Train model
        run: python train_model.py

      - name: Commit predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions.json
          git diff --staged --quiet || git commit -m "Update predictions $(date '+%Y-%m-%d')"
          git push
